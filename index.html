<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wavey-timer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel=“icon” href=“/favicon.ico” type=“image/x-icon”>
</head>
<body>
  <main class="app">
    <section class="timer-shell" aria-label="タイマー">
      <svg class="timer-graphic" viewBox="0 0 160 100" role="img" aria-labelledby="timer-label">
        <title id="timer-label">残り時間</title>
        <path id="track-sector" class="track"></path>
        <path id="timer-sector" class="sector"></path>
      </svg>
      <p id="time-label" class="time-label">25:00</p>
    </section>

    <section class="controls" aria-label="操作">
      <div id="input-zone" class="input-zone">
        <div class="preset-row">
          <button class="preset" data-minutes="5">5</button>
          <button class="preset" data-minutes="15">15</button>
          <button class="preset active" data-minutes="25">25</button>
          <label class="custom-minutes">
            <span>Min</span>
            <input id="minute-input" type="number" min="0" max="180" value="25">
          </label>
          <label class="custom-minutes">
            <span>Sec</span>
            <input id="second-input" type="number" min="0" max="59" value="0">
          </label>
        </div>
        <div class="slider-row">
          <input id="minute-slider" class="minute-slider" type="range" min="1" max="180" value="25" step="1" aria-label="時間スライダー（分単位）">
        </div>
      </div>
      <div class="action-row">
        <button id="start-pause" class="action primary">Start</button>
        <button id="reset" class="action">Reset</button>
      </div>
      <p class="hint">Space: Start/Pause / R: Reset</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
